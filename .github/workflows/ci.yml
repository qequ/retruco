name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install
      - name: Lint (ruff)
        run: poetry run ruff check .
      - name: Test
        run: poetry run python -m unittest discover -s tests -p 'test_*.py'

  run-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install
      - name: Run example programs
        run: |
          status=0
          for f in examples/*.timba; do
            echo "::group::$f"
            # 30s guard: a non-terminating program (e.g. the old sort bug)
            # exits 124 and fails the job instead of hanging the runner.
            timeout 30 poetry run retruco "$f"
            code=$?
            echo "::endgroup::"
            if [ $code -eq 124 ]; then
              echo "::error file=$f::timed out (possible infinite loop)"
              status=1
            elif [ $code -ne 0 ]; then
              echo "::error file=$f::exited with code $code"
              status=1
            fi
          done
          exit $status
